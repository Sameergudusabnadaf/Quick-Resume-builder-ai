<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Resume Generator</h1>
            <p>Fill in your details below to instantly generate a clean, professional text resume.</p>
        </header>

        <main>
            <div class="form-container glass-panel">
                <form id="resume-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" placeholder="555-1234">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="location">City / Location</label>
                            <input type="text" id="location" name="location" placeholder="New York, NY">
                        </div>
                        <div class="form-group">
                            <label for="job_title">Job Title Applying For</label>
                            <input type="text" id="job_title" name="job_title" placeholder="Software Engineer">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="education">Education</label>
                        <textarea id="education" name="education" placeholder="BSc Computer Science, MIT, 2024" rows="2"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="skills">Technical Skills</label>
                        <textarea id="skills" name="skills" placeholder="Python, JavaScript, React, Communication" rows="2"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="experience">Work Experience <span>(Type 'fresher' if none)</span></label>
                        <textarea id="experience" name="experience" placeholder="Software Intern at TechCorp..." rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="projects">Projects</label>
                        <textarea id="projects" name="projects" placeholder="Portfolio Website, E-commerce App..." rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="extras">Additional Information</label>
                        <textarea id="extras" name="extras" placeholder="AWS Certified, Fluent in Spanish..." rows="2"></textarea>
                    </div>

                    <button type="submit" class="btn-primary">Generate Resume</button>
                </form>
            </div>

            <div class="output-container glass-panel" id="output-section" style="display: none;">
                <div class="output-header">
                    <h2>Your Generated Resume</h2>
                    <button id="download-btn" class="btn-secondary">Download .doc (Word)</button>
                </div>
                <pre id="resume-output"></pre>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
